<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8A9A5B">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <title>המתכונים שלי</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-soft: #eef2ff;
      --border: #d8def0;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #dbe7ff;
      --accent-strong: #c4d7ff;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      font-size: 18px;
    }

    .app {
      padding: 16px;
      max-width: 600px;
      margin: auto;
    }

    .header {
      background: white;
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    #backBtn {
      font-size: 18px;
      padding: 10px 14px;
      border-radius: 12px;
      border: none;
      background: var(--panel-soft);
      cursor: pointer;
    }

    #title {
      font-size: 24px;
      font-weight: bold;
    }

    .category-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }

    .category-strip button {
      padding: 14px 20px;
      border-radius: 999px;
      border: none;
      background: var(--panel-soft);
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      min-height: 54px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .card {
      padding: 20px;
      border-radius: 18px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 110px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .card span:last-child {
      font-size: 40px;
    }

    .recipe {
      background: white;
      padding: 20px;
      border-radius: 18px;
    }

    .recipe h2 {
      font-size: 32px;
      margin-top: 0;
    }

    .recipe pre {
      font-size: 20px;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="topbar">
      <button id="backBtn">⬅</button>
      <div id="title">בחר קטגוריה12</div>
    </div>

    <div class="category-strip">
      <button data-cat="main">עיקרית</button>
      <button data-cat="side">תוספת</button>
      <button data-cat="dessert">קינוח</button>
      <button data-cat="starters">פתיחה</button>
      <button data-cat="baked">מאפים</button>
      <button data-cat="breakfast">בוקר</button>
      <button data-cat="salad">סלטים</button>
    </div>
  </div>

  <div id="list" class="grid"></div>
  <div id="recipe" class="recipe hidden"></div>

</div>

<script src="recipes.js"></script>

<script>
let currentCategory = null;
let path = [];

const listEl = document.getElementById("list");
const recipeEl = document.getElementById("recipe");
const titleEl = document.getElementById("title");

function showList() {
  listEl.classList.remove("hidden");
  recipeEl.classList.add("hidden");
}

function showRecipe() {
  listEl.classList.add("hidden");
  recipeEl.classList.remove("hidden");
}

function getNode() {
  let node = data[currentCategory];
  path.forEach(p => node = node[p]);
  return node;
}

function renderList(node) {
  listEl.innerHTML = "";

  Object.keys(node).forEach(key => {
    const val = node[key];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <span>${key}</span>
      <span>${typeof val === "object" ? "📁" : "🍽️"}</span>
    `;

    div.onclick = () => {
      if (typeof val === "object") {
        path.push(key);
        renderList(val);
        titleEl.textContent = key;
      } else {
        recipeEl.innerHTML = "<h2>" + key + "</h2><pre>" + val + "</pre>";
        showRecipe();
        titleEl.textContent = key;
      }
    };

    listEl.appendChild(div);
  });
}

function loadCategory(cat) {
  currentCategory = cat;
  path = [];
  renderList(data[cat]);
  showList();
  titleEl.textContent = cat;
}

document.querySelectorAll("[data-cat]").forEach(btn => {
  btn.onclick = () => loadCategory(btn.dataset.cat);
});

document.getElementById("backBtn").onclick = () => {
  if (!recipeEl.classList.contains("hidden")) {
    showList();
    return;
  }

  if (path.length > 0) {
    path.pop();
    renderList(getNode());
    return;
  }
};

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>

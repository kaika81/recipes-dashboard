<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA additions -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8A9A5B">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <title>דשבורד מתכונים</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-soft: #eef2ff;
      --border: #d8def0;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #dbe7ff;
      --accent-strong: #c4d7ff;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    .app-header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px 18px 14px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app-title {
      margin: 0 0 14px;
      font-size: 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .back-btn {
      border: none;
      background: var(--panel-soft);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      display: none;
    }

    .screen-title {
      margin: 0;
      font-size: 20px;
      flex: 1;
    }

    .category-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .category-strip button {
      background: var(--panel-soft);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
    }

    .category-strip button.active {
      background: var(--accent);
    }

    .screen {
      display: none;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      min-height: 420px;
    }

    .screen.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }

    .recipe-title {
      font-size: 28px;
    }

    .recipe-text {
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .empty-state {
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="app-header">
      <h1 class="app-title">המתכונים שלי</h1>

      <div class="topbar">
        <button id="backBtn" class="back-btn">חזור</button>
        <h2 id="screenTitle" class="screen-title">בחר קטגוריה</h2>
      </div>

      <div class="category-strip" id="categoryStrip">
        <button data-category="main">מנה עיקרית</button>
        <button data-category="side">תוספת</button>
        <button data-category="dessert">קינוח</button>
        <button data-category="starters">מנות פתיחה</button>
        <button data-category="baked">מאפים</button>
        <button data-category="breakfast">ארוחת בוקר</button>
        <button data-category="salad">סלטים</button>
      </div>
    </header>

    <main>
      <section id="listScreen" class="screen active">
        <div id="listGrid" class="grid"></div>
      </section>

      <section id="recipeScreen" class="screen">
        <div id="recipeView">
          <div class="empty-state">בחר מתכון</div>
        </div>
      </section>
    </main>
  </div>

  <script src="recipes.js"></script>

  <script>
    const categoryButtons = document.querySelectorAll('#categoryStrip button');
    const listGrid = document.getElementById('listGrid');
    const recipeView = document.getElementById('recipeView');
    const screenTitle = document.getElementById('screenTitle');
    const backBtn = document.getElementById('backBtn');

    let currentCategory = null;
    let path = [];

    function renderList(node) {
      listGrid.innerHTML = '';

      Object.keys(node).forEach(key => {
        const item = node[key];

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<span>${key}</span><span>‹</span>`;

        card.onclick = () => {
          if (typeof item === 'object') {
            path.push(key);
            renderList(item);
          } else {
            recipeView.innerHTML = `<h3 class="recipe-title">${key}</h3><div class="recipe-text">${item}</div>`;
            document.getElementById('recipeScreen').classList.add('active');
            document.getElementById('listScreen').classList.remove('active');
          }
        };

        listGrid.appendChild(card);
      });
    }

    categoryButtons.forEach(btn => {
      btn.onclick = () => {
        currentCategory = btn.dataset.category;
        path = [];
        renderList(data[currentCategory]);
      };
    });

    // Service Worker registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>

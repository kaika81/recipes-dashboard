<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>המתכונים שלי</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#8A9A5B" />
</head>

<body>
  <div class="app">
    <div class="screen">
<div class="topbar">
  <button id="backBtn" class="back-btn" aria-label="חזור">‹</button>

  <div class="title-wrap">
    <div id="title" class="title">בחר קטגוריה</div>
  </div>

  <button id="addRecipeBtn" class="shopping-top-btn" aria-label="הוסף מתכון">＋</button>
  <button id="shoppingBtn" class="shopping-top-btn" aria-label="רשימת קניות">🛒</button>
</div>

     <div id="userView" class="recipe-view hidden">
  <h2 class="recipe-title">מי משתמש באפליקציה?</h2>

  <div class="shopping-form">
    <input id="usernameInput" type="text" placeholder="הכנס שם" />
    <button id="saveUsernameBtn">שמור</button>
  </div>
</div>

<div id="categories" class="categories"></div>

<div id="recipeView" class="recipe-view hidden">
  <h2 id="recipeTitle" class="recipe-title"></h2>
        <pre id="recipeContent" class="recipe-content"></pre>
      </div>

<div id="shoppingView" class="recipe-view hidden">
  <h2 class="recipe-title">רשימת קניות</h2>

  <div class="shopping-form">
    <input id="shoppingInput" type="text" placeholder="מה להוסיף לרשימה?" />
    <button id="addShoppingItem">הוסף</button>
  </div>

  <div id="shoppingList"></div>
</div>

<div id="addRecipeView" class="recipe-view hidden">
  <h2 class="recipe-title">הוסף מתכון</h2>

  <label class="form-label">קטגוריה</label>
  <select id="newRecipeCategory" class="form-input">
    <option value="main">מנה עיקרית</option>
    <option value="side">תוספות</option>
    <option value="dessert">קינוחים</option>
    <option value="starters">מנות פתיחה</option>
    <option value="baked">מאפים</option>
    <option value="breakfast">ארוחת בוקר</option>
    <option value="salad">סלטים</option>
    <option value="fridayDinner">ארוחות שישי</option>
  </select>

  <label class="form-label">תת קטגוריה</label>
  <input id="newRecipeSubcategory" class="form-input" type="text" placeholder="לא חובה, למשל: עוף / פסטה" />

  <label class="form-label">שם מתכון</label>
  <input id="newRecipeTitle" class="form-input" type="text" placeholder="למשל: שניצל" />

  <label class="form-label">תוכן המתכון</label>
  <textarea id="newRecipeContent" class="form-input recipe-textarea" placeholder="מרכיבים:
- ...

אופן הכנה:
1. ...

שדרוגים:
- ..."></textarea>

  <button id="saveNewRecipeBtn" class="primary-action-btn">שמור מתכון</button>

  <div id="addRecipeStatus" class="success"></div>
</div>
    </div>
  </div>

<script type="module" src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
